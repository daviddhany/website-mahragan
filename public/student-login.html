<!doctype html><html><head>
  <meta name="viewport" content="width=device-width, initial-scale=1"><meta charset="utf-8"><title>تسجيل دخول   
</title><link rel="stylesheet" href="/public/styles.css"><link rel="icon" href="/public/logo-left.png" type="image/png"></head>
<body><header class="site-header">
  <a href="/" class="logo-link"><img src="/public/logo-left.png" class="header-logo" alt="Logo"></a>
  <div class="header-title"><h2>مهرجان حبة حنطة</h2></div>
  <div class="header-right">
    <nav class="header-actions">
      <a href="/" class="btn-nav">Home</a>
    </nav>
    <img src="/public/logo-right.png" class="header-logo" alt="Logo">
  </div>
</header><main><section class="card"><form id="form">
<label>الرقم القومي<input name="nationalId" required inputmode="numeric" pattern="\d{14}" maxlength="14" minlength="14" placeholder="14 رقم"></label><label>كلمة السر<input name="password" type="password" required></label><button>Login</button><p id="msg"></p></form></section></main>
<script src="/public/app.js"></script><script>
const nationalIdInput = document.querySelector('input[name="nationalId"]');
nationalIdInput.addEventListener('input', () => {
  nationalIdInput.value = nationalIdInput.value.replace(/\D/g, '').slice(0, 14);
});

document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  const body = Object.fromEntries(new FormData(e.target));
  if (!/^\d{14}$/.test(body.nationalId || '')) {
    message('msg', 'National ID must be exactly 14 numbers', false);
    return;
  }
  const button = e.target.querySelector('button');
  button.disabled = true;
  button.textContent = 'Logging in...';
  try {
    await api('/api/auth/student/login', { method:'POST', body: JSON.stringify(body) });
    location.href = '/public/student-dashboard.html';
  } catch(err) {
    message('msg', err.message, false);
    button.disabled = false;
    button.textContent = 'Login';
  }
});
</script><footer class="app-footer" dir="ltr">© 2026 CoptechAi. All rights reserved.</footer>
</body></html>
