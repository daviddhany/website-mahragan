<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تسجيل دخول</title>
  <link rel="icon" href="/public/logo-left.png" type="image/png">
  <link rel="stylesheet" href="/public/styles.css">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }

    /* ===== Header ===== */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 15px;
      background-color: #052642;
      color: white;
    }

    .header-left,
    .header-center,
    .header-right {
      display: flex;
      align-items: center;
    }

    .header-left .header-logo {
      height: 40px;
    }

    .header-center {
      flex: 1;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
    }

    .header-right .header-logo {
      height: 40px;
      margin-left: 10px;
    }

    .btn-nav {
      background: #fff;
      color: #052642;
      padding: 6px 12px;
      border-radius: 5px;
      text-decoration: none;
      margin-right: 10px;
      font-size: 14px;
    }

    /* ===== Card ===== */
    main {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 70px);
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 30px 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }

    .card label {
      display: block;
      margin-bottom: 15px;
      font-weight: bold;
    }

    .card input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .card button {
      width: 100%;
      padding: 12px;
      background-color: #052642;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 15px;
    }

    .card button:disabled {
      background-color: #888;
    }

    #msg {
      color: red;
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
    }

    /* Footer */
    .app-footer {
      text-align: center;
      font-size: 12px;
      color: #666;
      padding: 15px 0;
      background: #f4f4f4;
    }

  </style>
</head>
<body>

  <!-- ===== Header ===== -->
  <header class="site-header">
    <div class="header-left">
      <a href="/" class="logo-link">
        <img src="/public/logo-left.png" class="header-logo" alt="Logo">
      </a>
    </div>
    <div class="header-center">مهرجان حبة حنطة</div>
    <div class="header-right">
      <a href="/" class="btn-nav">Home</a>
      <img src="/public/logo-right.png" class="header-logo" alt="Right Logo">
    </div>
  </header>

  <!-- ===== Login Card ===== -->
  <main>
    <section class="card">
      <form id="form">
        <label>الرقم القومي
          <input name="nationalId" required inputmode="numeric" pattern="\d{14}" maxlength="14" minlength="14" placeholder="14 رقم">
        </label>
        <label>كلمة السر
          <input name="password" type="password" required>
        </label>
        <button>Login</button>
        <p id="msg"></p>
      </form>
    </section>
  </main>

  <footer class="app-footer">© 2026 CoptechAi. All rights reserved.</footer>

  <script src="/public/app.js"></script>
  <script>
    const nationalIdInput = document.querySelector('input[name="nationalId"]');
    nationalIdInput.addEventListener('input', () => {
      nationalIdInput.value = nationalIdInput.value.replace(/\D/g, '').slice(0, 14);
    });

    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      const body = Object.fromEntries(new FormData(e.target));
      if (!/^\d{14}$/.test(body.nationalId || '')) {
        message('msg', 'National ID must be exactly 14 numbers', false);
        return;
      }
      const button = e.target.querySelector('button');
      button.disabled = true;
      button.textContent = 'Logging in...';
      try {
        await api('/api/auth/student/login', { method:'POST', body: JSON.stringify(body) });
        location.href = '/public/student-dashboard.html';
      } catch(err) {
        message('msg', err.message, false);
        button.disabled = false;
        button.textContent = 'Login';
      }
    });
  </script>

</body>
</html>
