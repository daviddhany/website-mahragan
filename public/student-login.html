<!doctype html>
<html lang="ar">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تسجيل دخول</title>
  <link rel="stylesheet" href="/public/styles.css">
  <link rel="icon" href="/public/logo-left.png" type="image/png">
  <style>
    /* ===== Header ===== */
    header.site-header {
      display: flex;
      justify-content: space-between; /* logos at edges */
      align-items: center;
      background-color: #052642;
      padding: 10px 20px;
    }

    .header-left img,
    .header-right img {
      height: 80px; /* make logos bigger */
      width: auto;
    }

    /* ===== Main Login Card ===== */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    main {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 100px); /* header space */
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }

    label {
      display: block;
      margin-bottom: 15px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #052642;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:disabled {
      background-color: #4a6d8c;
    }

    #msg {
      margin-top: 10px;
      color: red;
      font-size: 14px;
    }

    footer {
      text-align: center;
      padding: 15px 0;
      color: #888;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="header-left">
      <img src="/public/logo-left.png" alt="Logo Left">
    </div>
    <div class="header-right">
      <img src="/public/logo-right.png" alt="Logo Right">
    </div>
  </header>

  <main>
    <section class="card">
      <form id="form">
        <label>
          الرقم القومي
          <input name="nationalId" required inputmode="numeric" pattern="\d{14}" maxlength="14" minlength="14" placeholder="14 رقم">
        </label>
        <label>
          كلمة السر
          <input name="password" type="password" required>
        </label>
        <button>Login</button>
        <p id="msg"></p>
      </form>
    </section>
  </main>

  <script src="/public/app.js"></script>
  <script>
    const nationalIdInput = document.querySelector('input[name="nationalId"]');
    nationalIdInput.addEventListener('input', () => {
      nationalIdInput.value = nationalIdInput.value.replace(/\D/g, '').slice(0, 14);
    });

    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      const body = Object.fromEntries(new FormData(e.target));
      if (!/^\d{14}$/.test(body.nationalId || '')) {
        document.getElementById('msg').textContent = 'National ID must be exactly 14 numbers';
        return;
      }
      const button = e.target.querySelector('button');
      button.disabled = true;
      button.textContent = 'Logging in...';
      try {
        await api('/api/auth/student/login', { method:'POST', body: JSON.stringify(body) });
        location.href = '/public/student-dashboard.html';
      } catch(err) {
        document.getElementById('msg').textContent = err.message;
        button.disabled = false;
        button.textContent = 'Login';
      }
    });
  </script>

  <footer class="app-footer">© 2026 CoptechAi. All rights reserved.</footer>
</body>
</html>
