<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="/public/styles.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f9f9f9;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo {
      display: block;
      margin: 0 auto 20px;
      max-width: 150px;
      height: auto;
    }

    .controls {
      text-align: center;
      margin-bottom: 20px;
    }

    .controls button {
      padding: 10px 20px;
      margin: 0 5px;
      font-size: 14px;
      border-radius: 6px;
      border: none;
      background-color: #052642;
      color: white;
      cursor: pointer;
    }

    .controls button:hover {
      background-color: #03406b;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: white;
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      padding: 12px 15px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    th {
      background-color: #052642;
      color: white;
    }

    tr:hover {
      background-color: #f1f1f1;
    }

    .role-label {
      padding: 4px 8px;
      border-radius: 6px;
      color: white;
      font-size: 12px;
    }

    .role-admin {
      background-color: #e74c3c;
    }

    .role-teacher {
      background-color: #3498db;
    }

    .role-service {
      background-color: #2ecc71;
    }

    footer.app-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: #555;
    }

    .search-box {
      text-align: center;
      margin-bottom: 20px;
    }

    .search-box input {
      padding: 10px;
      width: 300px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

  </style>
</head>
<body>

  <!-- Logo -->
  <img src="/public/logo mahragan.png" alt="Coptech Logo" class="logo">

  <h1>لوحة التحكم - المستخدمون</h1>

  <!-- Controls -->
  <div class="controls">
    <button id="showAdminsBtn">عرض المديرين</button>
  </div>

  <!-- Search -->
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="ابحث باسم المستخدم أو رقم الهاتف">
  </div>

  <!-- User Table -->
  <table id="userTable">
    <thead>
      <tr>
        <th>الاسم الكامل</th>
        <th>الهاتف</th>
        <th>الدور</th>
        <th>الصف المعين</th>
        <th>السنة المعينة</th>
      </tr>
    </thead>
    <tbody>
      <!-- Rows added dynamically -->
    </tbody>
  </table>

  <footer class="app-footer">© 2026 CoptechAi. All rights reserved.</footer>

  <script>
    const userTableBody = document.querySelector('#userTable tbody');
    const searchInput = document.getElementById('searchInput');
    const showAdminsBtn = document.getElementById('showAdminsBtn');

    // Function to load all users (teachers + service leaders)
    async function loadUsers(query = '') {
      try {
        const res = await fetch('/api/teachers?search=' + encodeURIComponent(query));
        if (!res.ok) throw new Error('فشل تحميل المستخدمين');
        const users = await res.json();
        populateTable(users);
      } catch (err) {
        alert(err.message);
      }
    }

    // Function to load only admins
    async function loadAdmins() {
      try {
        const res = await fetch('/api/admin/admins');
        if (!res.ok) throw new Error('فشل تحميل المديرين');
        const admins = await res.json();
        populateTable(admins);
      } catch (err) {
        alert(err.message);
      }
    }

    // Populate the table with users
    function populateTable(users) {
      userTableBody.innerHTML = '';
      users.forEach(u => {
        let roleClass = '';
        let roleText = '';

        if (u.role === 'admin') {
          roleClass = 'role-admin';
          roleText = 'أدمن';
        } else if (u.role === 'teacher') {
          roleClass = 'role-teacher';
          roleText = 'معلم';
        } else if (u.role === 'serviceLeader') {
          roleClass = 'role-service';
          roleText = 'أمين خدمة';
        }

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${u.fullName || '-'}</td>
          <td>${u.phone || '-'}</td>
          <td><span class="role-label ${roleClass}">${roleText}</span></td>
          <td>${u.assignedClass || '-'}</td>
          <td>${u.assignedYear || '-'}</td>
        `;
        userTableBody.appendChild(tr);
      });
    }

    // Initial load
    loadUsers();

    // Search event
    searchInput.addEventListener('input', () => {
      const query = searchInput.value.trim();
      loadUsers(query);
    });

    // Show admins button
    showAdminsBtn.addEventListener('click', () => {
      loadAdmins();
    });
  </script>

</body>
</html>
