<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="utf-8">
  <title>تم إنشاء الحساب</title>

  <link rel="stylesheet" href="/public/styles.css">
  <link rel="icon" href="/public/logo-generic.svg" type="image/png">

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    main {
      padding: 15px;
    }

    .card {
      max-width: 700px;
      margin: 20px auto;
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      text-align: right;
      word-break: break-word;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    @media (max-width: 600px) {
      .site-header {
        flex-direction: column;
        gap: 10px;
        text-align: center;
        padding: 12px;
      }

      .header-right {
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      .header-logo {
        width: 65px;
        height: auto;
      }

      .header-title h2 {
        font-size: 20px;
        margin: 5px 0;
      }

      .header-actions {
        justify-content: center;
      }

      .btn-nav {
        padding: 9px 14px;
        font-size: 14px;
      }

      .card {
        margin: 12px auto;
        padding: 15px;
        border-radius: 12px;
      }

      .card h2 {
        font-size: 22px;
        text-align: center;
      }

      .success {
        text-align: center;
        font-size: 15px;
      }

      table, tbody, tr, th, td {
        display: block;
        width: 100%;
      }

      tr {
        margin-bottom: 12px;
        border-bottom: 1px solid #ddd;
        padding-bottom: 8px;
      }

      th {
        font-size: 14px;
        color: #555;
        padding-bottom: 3px;
      }

      td {
        font-size: 16px;
        padding-top: 3px;
      }

      .success-buttons {
        flex-direction: column;
      }

      .success-buttons a {
        width: 100%;
        text-align: center;
      }

      .app-footer {
        font-size: 13px;
        text-align: center;
        padding: 12px;
      }
    }
  </style>
</head>

<body>

<header class="site-header">
  <a href="/" class="logo-link">
    <img src="/public/logo-generic.svg" class="header-logo" alt="Logo">
  </a>

  <div class="header-title">
    <h2>نظام التسجيل</h2>
  </div>

  <div class="header-right">
    <nav class="header-actions">
      <a href="/" class="btn-nav">الرئيسية</a>
      <a href="/c/9d4acaf0-6607-83ea-b660-4b9e88d19bd5" class="btn-nav login">تسجيل دخول</a>
    </nav>

    <img src="/public/logo-generic.svg" class="header-logo" alt="Logo">
  </div>
</header>

<main>
  <section class="card" id="successCard">
    <h2>تم إنشاء الحساب بنجاح</h2>

    <p class="success">
      احتفظ بكود المشارك لأنه سيستخدمه في تسجيل الدخول.
    </p>

    <div id="studentData"></div>

    <div class="success-buttons" style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
      <a class="btn-nav login" href="/c/9d4acaf0-6607-83ea-b660-4b9e88d19bd5">تسجيل الدخول</a>
      <a class="btn-nav" href="/c/7b2ecaf0-4405-83ea-b660-2f9e88d19bd3">تسجيل مشارك آخر</a>
    </div>
  </section>
</main>

<footer class="app-footer" dir="ltr">
  © 2026 Your Organization. All rights reserved.
</footer>

<script src="/public/app.js"></script>

<script>
  const dataBox = document.getElementById('studentData');
  const saved = sessionStorage.getItem('lastRegisteredStudent');

  function safeText(value) {
    return String(value || '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  if (!saved) {
    dataBox.innerHTML = '<p class="error">لا توجد بيانات تسجيل حديثة. من فضلك سجل مشارك جديد.</p>';
  } else {
    const student = JSON.parse(saved);

    dataBox.innerHTML = `
      <table>
        <tr>
          <th>كود المشارك / ID</th>
          <td><strong>${safeText(student.studentCode)}</strong></td>
        </tr>

        <tr>
          <th>الاسم</th>
          <td>${safeText(student.fullName)}</td>
        </tr>

        <tr>
          <th>النوع</th>
          <td>${student.gender === 'male' ? 'ذكر' : 'أنثى'}</td>
        </tr>

        <tr>
          <th>الخدمة</th>
          <td>${safeText(student.className)}</td>
        </tr>

        <tr>
          <th>السنة</th>
          <td>${safeText(student.studentYear)}</td>
        </tr>

        <tr>
          <th>سنة دخول أولى ابتدائي</th>
          <td>${safeText(student.entryYear)}</td>
        </tr>

        <tr>
          <th>تاريخ الميلاد</th>
          <td>${safeText(student.birthDate)}</td>
        </tr>

        <tr>
          <th>رقم ولي الأمر</th>
          <td>${safeText(student.parentPhone)}</td>
        </tr>

        <tr>
          <th>رقم المشارك</th>
          <td>${safeText(student.studentPhone || 'لا يوجد')}</td>
        </tr>

        <tr>
          <th>العنوان</th>
          <td>${safeText(student.address)}</td>
        </tr>


      </table>
    `;
  }
</script>

</body>
</html>
