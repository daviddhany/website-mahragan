<!doctype html><html><head>
  <meta name="viewport" content="width=device-width, initial-scale=1"><meta charset="utf-8"><title>Create Account</title><link rel="stylesheet" href="/public/styles.css">
<link rel="icon" href="/public/logo-left.png" type="image/png"></head>
<body>
<header class="site-header">
  <a href="/" class="logo-link"><img src="/public/logo-left.png" class="header-logo" alt="Logo"></a>
  <div class="header-title"><h2>Student Activity Management System</h2></div>
  <div class="header-right">
    <nav class="header-actions">
      <a href="/" class="btn-nav">Home</a>
      <a href="/c/9d4acaf0-6607-83ea-b660-4b9e88d19bd5" class="btn-nav login">Login</a>
    </nav>
    <img src="/public/logo-right.png" class="header-logo" alt="Logo">
  </div>
</header>
<main><section class="card"><div id="registrationClosedBox" class="error" style="display:none;margin-bottom:12px;">Registration is currently closed by the administrator.</div><form id="form">
<label>Full Name<input name="fullName" required></label>
<label>Gender<select name="gender" required><option value="male">Male</option><option value="female">Female</option></select></label>
<label>Date of Birth<input name="birthDate" type="date" required></label>

<label>Department
 <select name="className" id="className" required>
  <option value="">Select Department</option>
  <option value="Department A">Department A</option>
  <option value="Department B">Department B</option>
  <option value="Department C">Department C</option>
  <option value="Upper Primary">Upper Primary</option>
  <option value="Middle School">Middle School</option>
</select>
  <label>Grade</label>
<select name="studentYear" id="studentYear" required>
  <option value="">Select Grade</option>
  <option value="Grade 1">Grade 1</option>
  <option value="Grade 2">Grade 2</option>
  <option value="Grade 3">Grade 3</option>
  <option value="Grade 4">Grade 4</option>
  <option value="Grade 5">Grade 5</option>
  <option value="Grade 6">Grade 6</option>
  <option value="Grade 7">Grade 7</option>
  <option value="Grade 8">Grade 8</option>
  <option value="Grade 9">Grade 9</option>
</select>
</label>
<label>Password*<input name="password" type="password" required></label>
<label>Guardian Phone*<input name="parentPhone" required pattern="\d{11}" maxlength="11" placeholder="11 digits"></label>
<label>Student Phone - Optional<input name="studentPhone" pattern="\d{11}" maxlength="11" placeholder="11 digits"></label>
<label>Address*<textarea name="address" required></textarea></label>
<button id="submitBtn">Save Data</button><p id="msg"></p></form></section></main>
<footer class="app-footer" dir="ltr">© 2026 Your Organization. All rights reserved.</footer>
<script src="/public/app.js"></script><script>


async function checkRegistrationStatus() {
  try {
    const settings = await api('/api/students/registration-status');

    if (!settings.registrationOpen) {
      const box = document.getElementById('registrationClosedBox');
      const form = document.getElementById('form');
      const button = document.getElementById('submitBtn');

      if (box) {
        box.style.display = 'block';
        box.textContent = 'Registration is currently closed by the administrator.';
      }
      if (button) {
        button.disabled = true;
        button.textContent = 'Registration is currently closed';
      }

      if (form) {
        form.querySelectorAll('input, select, textarea').forEach(input => {
          input.disabled = true;
        });
      }
    } else if (settings.registrationClosesAt) {
      const box = document.getElementById('registrationClosedBox');
      if (box) {
        box.style.display = 'block';
        box.className = 'success';
        box.textContent = `Registration is open and will close automatically at ${new Date(settings.registrationClosesAt).toLocaleString('en-US')}.`;
      }
    }
  } catch (err) {
    // If status check fails, the server-side protection still handles registration.
  }
}

checkRegistrationStatus();

const yearOptionsByClass = {
  'Department A': [
    ['Grade 1', 'Grade 1'],
    ['Grade 2', 'Grade 2'],
    ['Grade 3', 'Grade 3'],
    ['Grade 4', 'Grade 4']
  ],
  'Department B': [
    ['Grade 1', 'Grade 1'],
    ['Grade 2', 'Grade 2'],
    ['Grade 3', 'Grade 3'],
    ['Grade 4', 'Grade 4']
  ],
  'Department C': [
    ['Grade 1', 'Grade 1'],
    ['Grade 2', 'Grade 2'],
    ['Grade 3', 'Grade 3'],
    ['Grade 4', 'Grade 4']
  ],
  'Upper Primary': [
    ['Grade 5', 'Grade 5'],
    ['Grade 6', 'Grade 6']
  ],
  'Middle School': [
    ['Grade 7', 'Grade 7'],
    ['Grade 8', 'Grade 8'],
    ['Grade 9', 'Grade 9']
  ]
};

function updateYearOptions() {
  const classSelect = document.getElementById('className');
  const yearSelect = document.getElementById('studentYear');
  const selectedClass = classSelect.value;
  const years = yearOptionsByClass[selectedClass] || [];

  yearSelect.innerHTML = '<option value="">Select Grade</option>';

  years.forEach(([value, label]) => {
    const option = document.createElement('option');
    option.value = value;
    option.textContent = label;
    yearSelect.appendChild(option);
  });

  yearSelect.disabled = years.length === 0;
}

document.getElementById('className').addEventListener('change', updateYearOptions);
updateYearOptions();

document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  const body = Object.fromEntries(new FormData(e.target));
  const button = document.getElementById('submitBtn');

 

  button.disabled = true;
  button.textContent = 'Saving...';
  try {
    const data = await api('/api/students/register', { method:'POST', body: JSON.stringify(body) });
    sessionStorage.setItem('lastRegisteredStudent', JSON.stringify(data.student || {}));
    sessionStorage.setItem('lastStudentCode', data.studentCode || '');
    message('msg', `Data saved. Student code: ${data.studentCode}. The data page will open...`);
    setTimeout(() => { location.href = '/c/8c3fcaf0-5506-83ea-b660-3a9e88d19bd4'; }, 700);
  } catch(err) {
    message('msg', err.message, false);
    button.disabled = false;
    button.textContent = 'Save Data';
  }
});
</script></body></html>
